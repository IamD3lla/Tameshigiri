name: Continuous Delivery

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Game
    runs-on: ubuntu-24.04

    env:
      BUILD_TYPE: Release

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake g++ make git zip \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcursor-dev \
            libxinerama-dev

      - name: Install Raylib
        run: |
          git clone https://github.com/raysan5/raylib.git
          cd raylib
          mkdir build
          cd build
          cmake .. -DBUILD_SHARED_LIBS=ON
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build Project
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Debug Build Output
        run: ls -R build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: |
            build/game
            assets/

  download-and-package:
    name: Download and Package Game
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: game-build
          path: package

      - name: Show Downloaded Files
        run: ls -R package

      - name: Package Game
        run: |
          cd package
          chmod +x build/game
          zip -r game-linux-${{ github.sha }}.zip .

      - name: Upload Final Download Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tameshigiri-linux
          path: package/game-linux-${{ github.sha }}.zip