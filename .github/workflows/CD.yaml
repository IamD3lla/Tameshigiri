name: Continuous Delivery

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  build-and-package:
    name: Build and Package Game
    runs-on: ubuntu-24.04

    env:
      BUILD_TYPE: Release

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      # 🔥 Cache do build (acelera muito)
      - name: Cache Build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake g++ make git zip \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcursor-dev \
            libxinerama-dev

      - name: Install Raylib
        run: |
          if [ ! -d "raylib" ]; then
            git clone https://github.com/raysan5/raylib.git
            cd raylib
            mkdir build
            cd build
            cmake .. -DBUILD_SHARED_LIBS=ON
            make -j$(nproc)
            sudo make install
            sudo ldconfig
          fi

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build Project
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Debug Build Output
        run: ls -R build

      - name: Package Game
        run: |
          mkdir -p dist
          cp build/game dist/
          cp -r assets dist/ || true
          cd dist
          zip -r game-${{ github.sha }}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tameshigiri-${{ github.sha }}
          path: dist/*.zip