name: Continuous Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-package:
    name: Build and Package Game
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            g++ \
            make \
            git \
            zip \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcursor-dev \
            libxinerama-dev

      - name: Install Raylib
        run: |
          git clone https://github.com/raysan5/raylib.git
          cd raylib
          mkdir build
          cd build
          cmake .. -DBUILD_SHARED_LIBS=ON
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build Project
        uses: threeal/cmake-action@v2.1.0
        with:
          source-dir: .
          build-dir: build

      - name: Debug Build Output
        run: ls -R build

      - name: Package Game
        run: |
          mkdir -p dist
          cp build/Tameshigiri dist/
          cp -r assets dist/ || true
          cd dist
          zip -r game-linux.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tameshigiri-linux
          path: dist/game-linux.zip